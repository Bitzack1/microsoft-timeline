<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft History Timeline - Cinematic</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto:wght@400&display=swap" rel="stylesheet">

<style>
  body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #000;
    font-family: 'Roboto', sans-serif;
    perspective: 1000px;
    color: #fff;
  }

  audio { display: none; }

  .timeline-container {
    width: 100%;
    height: 100vh;
    position: relative;
    transform-style: preserve-3d;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 50px;
    opacity: 0;
    transition: opacity 2s ease-in-out, transform 2s ease-in-out;
  }

  .slide.active {
    opacity: 1;
    transform: translateZ(0) scale(1);
    z-index: 10;
  }

  .year {
    font-family: 'Orbitron', sans-serif;
    font-size: 5em;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
    animation: flyIn 1s ease-out;
    color: #fff;
  }

  .event {
    font-size: 1.8em;
    max-width: 900px;
    line-height: 1.6;
    animation: fadeIn 2s ease-in-out;
    color: #fff;
  }

  .logo, .image {
    width: 200px;
    margin: 20px 0;
    animation: zoomIn 2s ease-in-out;
  }

  @keyframes flyIn {
    0% { transform: translateY(-100px) rotateX(30deg); opacity: 0; }
    100% { transform: translateY(0) rotateX(0); opacity: 1; }
  }

  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  @keyframes zoomIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Decade backgrounds */
  .bg-1970s { background: radial-gradient(circle, #0b3d91 0%, #000 100%); }
  .bg-1980s { background: linear-gradient(45deg, #ffcc00, #000); animation: grid80s 10s infinite linear; }
  .bg-1990s { background: url('90s-office.jpg') center/cover no-repeat; }
  .bg-2000s { background: linear-gradient(120deg, #ff4d4d, #111); }
  .bg-2010s { background: linear-gradient(135deg, #28a745, #111); }
  .bg-2020s { background: linear-gradient(150deg, #6f42c1, #111); }

  @keyframes grid80s {
    0% { background-position: 0 0; }
    100% { background-position: 100% 100%; }
  }
</style>
</head>
<body>

<!-- Background music -->
<audio autoplay loop>
  <source src="Microsoft.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div class="timeline-container" id="timeline"></div>

<script>
const slidesData = [
  { year: 1975, event: "Microsoft founded on April 4th by Bill Gates and Paul Allen.", theme: "bg-1970s", logo: "microsoft-logo.png", image: "1975-image.png" },
  { year: 1980, event: "Microsoft forms partnership with IBM to develop MS-DOS.*", theme: "bg-1980s", logo: "microsoft-logo.png", image: "1980-image.png" },
  { year: 1985, event: "Windows 1.0 released, first GUI for MS-DOS.", theme: "bg-1980s", logo: "microsoft-logo.png", image: "1985-image.png" },
  { year: 1990, event: "Windows 3.0 launches, Microsoft becomes a software giant.", theme: "bg-1990s", logo: "microsoft-logo.png", image: "1990-image.png" },
  { year: 1995, event: "Windows 95 introduces Start menu and taskbar.", theme: "bg-1990s", logo: "microsoft-logo.png", image: "1995-image.png" },
  { year: 2000, event: "Windows 2000 released; Bill Gates steps down as CEO.", theme: "bg-2000s", logo: "microsoft-logo.png", image: "2000-image.png" },
  { year: 2001, event: "Xbox launches, entering gaming console market.", theme: "bg-2000s", logo: "microsoft-logo.png", image: "2001-image.png" },
  { year: 2007, event: "Windows Vista and Office 2007 release with new UI.", theme: "bg-2000s", logo: "microsoft-logo.png", image: "2007-image.png" },
  { year: 2010, event: "Windows 7 widely adopted for stability and performance.", theme: "bg-2010s", logo: "microsoft-logo.png", image: "2010-image.png" },
  { year: 2012, event: "Windows 8 launches with Metro UI and touch support.", theme: "bg-2010s", logo: "microsoft-logo.png", image: "2012-image.png" },
  { year: 2015, event: "Windows 10 released; continuous updates across devices.", theme: "bg-2010s", logo: "microsoft-logo.png", image: "2015-image.png" },
  { year: 2021, event: "Windows 11 officially released with refreshed UI, rounded corners, and new Start menu.", theme: "bg-2020s", logo: "microsoft-logo.png", image: "2021-image.png" },
  { year: 2020, event: "Microsoft Teams adoption grows; Xbox Series X released.", theme: "bg-2020s", logo: "microsoft-logo.png", image: "2020-image.png" },
  { year: 2023, event: "Microsoft cloud growth via Azure and AI in Microsoft 365.", theme: "bg-2020s", logo: "microsoft-logo.png", image: "2023-image.png" },
];

const container = document.getElementById('timeline');
const slideDuration = 5000; // 5 seconds per slide

slidesData.forEach(slide => {
  const div = document.createElement('div');
  div.className = `slide ${slide.theme}`;
  div.innerHTML = `
    <img src="${slide.logo}" class="logo" alt="Microsoft Logo">
    <div class="year">${slide.year}</div>
    <div class="event">${slide.event}</div>
    <img src="${slide.image}" class="image" alt="Year Image">
  `;
  container.appendChild(div);
});

// Slide animation logic
const slides = document.querySelectorAll('.slide');
let currentIndex = 0;
slides[0].classList.add('active');

function nextSlide() {
  slides[currentIndex].classList.remove('active');
  currentIndex = (currentIndex + 1) % slides.length;
  slides[currentIndex].classList.add('active');
}

setInterval(nextSlide, slideDuration);
</script>

</body>
</html>
